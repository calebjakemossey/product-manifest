name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  parse-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      version: ${{ steps.parse.outputs.version }}
      variants: ${{ steps.parse.outputs.variants }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse tag for version and variant
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Check if tag ends with a known variant suffix
          for variant_dir in variants/*/; do
            variant=$(basename "$variant_dir")
            if [[ "$TAG" == *"-${variant}" ]]; then
              version="${TAG%-${variant}}"
              echo "version=$version" >> $GITHUB_OUTPUT
              echo "variants=[\"${variant}\"]" >> $GITHUB_OUTPUT
              echo "Tag '$TAG' targets variant '$variant' at version '$version'"
              exit 0
            fi
          done

          # No variant suffix: release all variants
          all_variants=$(ls -d variants/*/ | xargs -I{} basename {} | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "variants=$all_variants" >> $GITHUB_OUTPUT
          echo "Tag '$TAG' is a full release of all variants: $all_variants"

  build-variant:
    needs: [parse-tag]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        variant: ${{ fromJson(needs.parse-tag.outputs.variants) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          push: true
          build-args: |
            ROS_DISTRO=humble
            VARIANT=${{ matrix.variant }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/robot-software:${{ needs.parse-tag.outputs.version }}-${{ matrix.variant }}
            ghcr.io/${{ github.repository_owner }}/robot-software:latest-${{ matrix.variant }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,scope=${{ matrix.variant }},mode=max

  create-release:
    needs: [parse-tag, build-variant]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Build release notes
        id: notes
        env:
          VERSION: ${{ needs.parse-tag.outputs.version }}
          VARIANTS_JSON: ${{ needs.parse-tag.outputs.variants }}
        run: |
          {
            echo "## Variants"
            echo ""
            for variant in $(echo "$VARIANTS_JSON" | jq -r '.[]'); do
              echo "- **${variant}**: \`docker pull ghcr.io/${{ github.repository_owner }}/robot-software:${VERSION}-${variant}\`"
            done

            echo ""
            echo "## Package Versions"
            echo ""

            for variant in $(echo "$VARIANTS_JSON" | jq -r '.[]'); do
              echo "### ${variant}"
              echo ""
              echo "| Package | Version |"
              echo "|---------|---------|"

              manifest="variants/${variant}/manifest.repos"
              if [ -f "$manifest" ]; then
                # Parse .repos YAML: extract package name (last path segment) and version
                awk '
                  /^  [^ #]/ {
                    # Repository key line - extract package name from path
                    gsub(/:$/, "")
                    n = split($1, parts, "/")
                    pkg = parts[n]
                  }
                  /version:/ && pkg != "" {
                    print "| " pkg " | " $2 " |"
                    pkg = ""
                  }
                ' "$manifest"
              fi
              echo ""
            done

          } > /tmp/release-body.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ needs.parse-tag.outputs.version }}" \
            --notes-file /tmp/release-body.md \
            --generate-notes
