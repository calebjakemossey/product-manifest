name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v2.1.0)'
        required: true
      variants:
        description: 'Variants to build (comma-separated, e.g. "v1" or "v1,v2")'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  discover-variants:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      variants: ${{ steps.find.outputs.variants }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Discover variants
        id: find
        run: |
          if [ -n "${{ github.event.inputs.variants }}" ]; then
            # Manual dispatch: use specified variants
            variants=$(echo "${{ github.event.inputs.variants }}" | tr ',' '\n' | jq -R -s -c 'split("\n") | map(select(. != ""))')
          else
            # Tag push: build all variants
            variants=$(ls variants/*/manifest.repos | sed 's|variants/||;s|/manifest.repos||' | jq -R -s -c 'split("\n") | map(select(. != ""))')
          fi
          echo "variants=$variants" >> $GITHUB_OUTPUT
          echo "Building variants: $variants"

  build-variant:
    needs: [discover-variants]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        variant: ${{ fromJson(needs.discover-variants.outputs.variants) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          push: true
          build-args: |
            ROS_DISTRO=humble
            VARIANT=${{ matrix.variant }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/robot-software:${{ needs.discover-variants.outputs.version }}-${{ matrix.variant }}
            ghcr.io/${{ github.repository_owner }}/robot-software:latest-${{ matrix.variant }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,scope=${{ matrix.variant }},mode=max
